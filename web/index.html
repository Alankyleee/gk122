<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GK122 高拍仪 - 多张扫描系统</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Microsoft YaHei",sans-serif;background:#f3f5f9;color:#222;padding:16px}
.container{max-width:1600px;margin:0 auto}
h1{font-size:22px;margin-bottom:16px;font-weight:600}
.main{display:flex;gap:16px;flex-wrap:wrap}
.video-panel{flex:1;min-width:580px;background:#fff;border-radius:8px;padding:14px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.video-wrapper{width:100%;background:#c6ccd8;border-radius:6px;display:flex;align-items:center;justify-content:center;min-height:400px;overflow:hidden;position:relative}
#video{max-width:100%;max-height:600px;display:none}
.placeholder{color:#90969f;font-size:16px;text-align:center}
.toolbar{margin-top:10px;display:flex;gap:8px;flex-wrap:wrap}
.info-bar{margin-top:8px;display:flex;gap:8px;flex-wrap:wrap}
.tag{display:inline-block;padding:2px 8px;background:#f0f0f0;border-radius:3px;font-size:12px;color:#666}
.right-panel{width:420px;display:flex;flex-direction:column;gap:12px}
.card{background:#fff;border-radius:8px;padding:14px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.card-title{font-size:15px;font-weight:600;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid #eee;display:flex;align-items:center;justify-content:space-between}
.card-title .badge{background:#409eff;color:#fff;font-size:11px;padding:2px 8px;border-radius:10px;font-weight:400}
.form-row{margin-bottom:10px}
.form-row label{display:block;font-size:12px;color:#666;margin-bottom:4px}
.form-row select,.form-row input[type=range],.form-row input[type=number]{width:100%;padding:5px 8px;border:1px solid #dcdfe6;border-radius:4px;font-size:13px}
.form-row input[type=range]{padding:0;height:26px}
.form-row .val{float:right;color:#888;font-size:11px}
.btn{display:inline-block;padding:8px 16px;border:none;border-radius:4px;font-size:13px;cursor:pointer;transition:all .2s;font-weight:500}
.btn-primary{background:#409eff;color:#fff}.btn-primary:hover{background:#337ecc}
.btn-success{background:#67c23a;color:#fff}.btn-success:hover{background:#529b2e}
.btn-warning{background:#e6a23c;color:#fff}.btn-warning:hover{background:#b88230}
.btn-danger{background:#f56c6c;color:#fff}.btn-danger:hover{background:#c45656}
.btn-sm{padding:5px 12px;font-size:12px}
.btn-group{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
.divider{height:1px;background:#eee;margin:12px 0}
.scan-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:8px;max-height:300px;overflow-y:auto;padding:4px}
.scan-item{position:relative;border-radius:4px;overflow:hidden;border:2px solid transparent;cursor:pointer;aspect-ratio:3/4}
.scan-item:hover{border-color:#409eff}
.scan-item.selected{border-color:#67c23a}
.scan-item img{width:100%;height:100%;object-fit:cover}
.scan-item .idx{position:absolute;top:2px;left:2px;background:rgba(0,0,0,.6);color:#fff;font-size:10px;padding:1px 5px;border-radius:2px}
.scan-item .del{position:absolute;top:2px;right:2px;background:#f56c6c;color:#fff;font-size:10px;padding:1px 5px;border-radius:2px;cursor:pointer;display:none}
.scan-item:hover .del{display:block}
.status-bar{margin-top:8px;padding:8px 12px;background:#ecf5ff;border:1px solid #b3d8ff;border-radius:4px;font-size:12px;color:#409eff}
.status-bar.error{background:#fef0f0;border-color:#fbc4c4;color:#f56c6c}
.status-bar.success{background:#f0f9eb;border-color:#c2e7b0;color:#67c23a}
.tab-bar{display:flex;border-bottom:2px solid #eee;margin-bottom:12px}
.tab{padding:6px 16px;font-size:13px;cursor:pointer;color:#999;border-bottom:2px solid transparent;margin-bottom:-2px}
.tab.active{color:#409eff;border-bottom-color:#409eff;font-weight:500}
.papers-row{display:flex;gap:10px;margin-bottom:10px}
.papers-row .scan-item{flex:1;aspect-ratio:8/5}
.canvas-area{display:none}
#pdf-iframe{display:none}
</style>
</head>
<body>
<div class="container">
<h1>GK122 高拍仪 — 多张扫描系统 (纯前端)</h1>
<div class="main">
<div class="video-panel">
  <div class="video-wrapper">
    <div class="placeholder" id="placeholder">📷<div style="margin-top:6px">选择设备后点击「开启摄像头」</div></div>
    <video id="video" autoplay playsinline></video>
  </div>
  <canvas id="canvas" class="canvas-area"></canvas>
  <div class="toolbar">
    <button class="btn btn-primary" onclick="startCamera()">▶ 开启</button>
    <button class="btn btn-danger" onclick="stopCamera()">⏹ 停止</button>
    <button class="btn btn-success" onclick="scanOne()">📸 扫描</button>
    <button class="btn btn-warning" onclick="rotateVideo()">↻ 旋转</button>
    <button class="btn btn-primary btn-sm" onclick="fullscreenVideo()">⛶</button>
  </div>
  <div class="info-bar">
    <span class="tag" id="resTag">分辨率: -</span>
    <span class="tag" id="statusTag">状态: 未连接</span>
    <span class="tag" id="scanCountTag">已扫描: 0</span>
    <span class="tag" id="recordTag"></span>
  </div>
</div>

<div class="right-panel">
  <div class="card">
    <div class="card-title">设备设置</div>
    <div class="form-row"><label>摄像头</label><select id="deviceSelect"></select></div>
    <div class="form-row"><label>分辨率</label>
      <select id="resolutionSelect">
        <option value="4608x3456">4608×3456 (1600万)</option>
        <option value="4328x3246">4328×3246 (1400万)</option>
        <option value="4032x3024">4032×3024 (1200万)</option>
        <option value="3668x2751">3668×2751 (1000万)</option>
        <option value="3264x2448" selected>3264×2448 (800万 · 推荐)</option>
        <option value="2592x1944">2592×1944 (500万)</option>
        <option value="2048x1536">2048×1536 (300万)</option>
        <option value="1920x1080">1920×1080 (200万)</option>
        <option value="1600x1200">1600×1200 (192万)</option>
      </select>
    </div>
    <div class="form-row"><label>亮度 <span class="val" id="briVal">0</span></label>
      <input type="range" id="brightness" min="-64" max="64" value="0" oninput="document.getElementById('briVal').textContent=this.value"></div>
    <div class="form-row"><label>对比度 <span class="val" id="conVal">32</span></label>
      <input type="range" id="contrast" min="0" max="64" value="32" oninput="document.getElementById('conVal').textContent=this.value"></div>
    <div class="form-row"><label>锐度 <span class="val" id="shaVal">2</span></label>
      <input type="range" id="sharpness" min="1" max="7" value="2" oninput="document.getElementById('shaVal').textContent=this.value"></div>
    <div class="btn-group"><button class="btn btn-warning btn-sm" onclick="applyConstraints()">应用</button></div>
  </div>

  <div class="card">
    <div class="card-title">扫描模式 <span class="badge" id="scanModeBadge">手动</span></div>
    <div class="tab-bar">
      <div class="tab active" onclick="switchScanTab('manual',this)">手动扫描</div>
      <div class="tab" onclick="switchScanTab('interval',this)">定时扫描</div>
      <div class="tab" onclick="switchScanTab('auto',this)">自动扫描</div>
      <div class="tab" onclick="switchScanTab('papers',this)">证件扫描</div>
      <div class="tab" onclick="switchScanTab('record',this)">录制</div>
    </div>

    <div id="tab-manual">
      <p style="font-size:12px;color:#888;margin-bottom:8px">点击「扫描」按钮逐张拍照</p>
      <div class="form-row"><label>格式</label>
        <select id="scanFormat"><option value="image/jpeg">JPG</option><option value="image/png">PNG</option><option value="image/webp">WebP</option></select></div>
      <div class="form-row"><label>质量 <span class="val" id="scanQualityVal">0.92</span></label>
        <input type="range" id="scanQuality" min="0.5" max="1" value="0.92" step="0.01" oninput="document.getElementById('scanQualityVal').textContent=this.value"></div>
      <div class="btn-group">
        <button class="btn btn-success" onclick="scanOne()">📸 扫描当前帧</button>
        <button class="btn btn-primary btn-sm" onclick="scanFive()">连续5张</button>
      </div>
    </div>

    <div id="tab-interval" style="display:none">
      <div class="form-row"><label>间隔(秒)</label>
        <input type="number" id="intervalSec" value="3" min="1" max="60" step="1"></div>
      <div class="form-row"><label>格式</label>
        <select id="intervalFormat"><option value="image/jpeg">JPG</option><option value="image/png">PNG</option></select></div>
      <div class="btn-group">
        <button class="btn btn-success" onclick="startIntervalScan()">▶ 开始定时扫描</button>
        <button class="btn btn-danger" onclick="stopScan()">⏹ 停止</button>
      </div>
    </div>

    <div id="tab-auto" style="display:none">
      <p style="font-size:12px;color:#888;margin-bottom:8px">检测到文档后自动扫描(延迟3秒)</p>
      <div class="form-row"><label>延迟(秒)</label>
        <input type="number" id="autoDelay" value="3" min="1" max="30"></div>
      <div class="btn-group">
        <button class="btn btn-success" onclick="startAutoScan()">▶ 开始自动扫描</button>
        <button class="btn btn-danger" onclick="stopScan()">⏹ 停止</button>
      </div>
    </div>

    <div id="tab-papers" style="display:none">
      <div class="form-row"><label>证件类型</label>
        <select id="papersType"><option>身份证</option><option>护照</option><option>驾驶证</option><option>其他</option></select></div>
      <div class="papers-row">
        <div class="scan-item" id="papersFront" onclick="scanPapers('front')" style="border:2px dashed #dcdfe6;display:flex;align-items:center;justify-content:center;color:#999;font-size:12px">
          正面(人像) - 点击扫描
        </div>
        <div class="scan-item" id="papersBack" onclick="scanPapers('back')" style="border:2px dashed #dcdfe6;display:flex;align-items:center;justify-content:center;color:#999;font-size:12px">
          反面(国徽) - 点击扫描
        </div>
      </div>
      <div class="form-row"><label>拼接方向</label>
        <select id="concatDir"><option value="vertical">上下竖拼</option><option value="horizontal">左右横拼</option></select></div>
      <div class="btn-group">
        <button class="btn btn-primary" onclick="concatPapers()">拼接正反面</button>
        <button class="btn btn-danger btn-sm" onclick="clearPapers()">重置</button>
      </div>
    </div>

    <div id="tab-record" style="display:none">
      <div class="form-row"><label>帧率</label>
        <select id="recordFps"><option value="10">10fps</option><option value="15" selected>15fps</option><option value="20">20fps</option><option value="30">30fps</option></select></div>
      <div class="btn-group">
        <button class="btn btn-danger" onclick="startRecord()">⏺ 开始录制</button>
        <button class="btn btn-warning" onclick="stopRecord()">⏹ 停止录制</button>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">已扫描 <span class="badge" id="scanTotalBadge">0</span></div>
    <div class="scan-grid" id="scanGrid">
      <div style="grid-column:1/-1;text-align:center;color:#ccc;font-size:12px;padding:20px">暂无扫描图片</div>
    </div>
    <div class="divider"></div>
    <div class="btn-group">
      <button class="btn btn-primary btn-sm" onclick="exportPdf()">📄 导出PDF</button>
      <button class="btn btn-warning btn-sm" onclick="downloadAll()">⬇ 下载全部</button>
      <button class="btn btn-danger btn-sm" onclick="clearAll()">🗑 清空</button>
    </div>
  </div>

  <div class="status-bar" id="statusBar">就绪</div>

  <div style="font-size:11px;color:#999;background:#f8f9fa;padding:8px;border-radius:4px">
    <div>💡 提示: 本页面纯前端实现，无需后端服务</div>
    <div>📷 高拍仪需要支持 UVC 协议并安装驱动</div>
    <div>⚠️ PDF导出需加载 jsPDF 库(首次可能较慢)</div>
  </div>
</div>
</div>
</div>
<iframe id="pdf-iframe"></iframe>

<script>
let currentStream = null;
let scanImages = [];
let scanCount = 0;
let scanTimer = null;
let isScanning = false;
let papersFrontData = "";
let papersBackData = "";
let recorder = null;
let recordedChunks = [];

function setStatus(msg, type) {
  const b = document.getElementById("statusBar");
  b.textContent = msg;
  b.className = "status-bar" + (type ? " " + type : "");
}

async function initDevices() {
  try {
    await navigator.mediaDevices.getUserMedia({ video: true });
    const devices = await navigator.mediaDevices.enumerateDevices();
    const videoDevices = devices.filter(d => d.kind === 'videoinput');
    const sel = document.getElementById("deviceSelect");
    sel.innerHTML = "";
    videoDevices.forEach((dev, idx) => {
      const o = document.createElement("option");
      o.value = dev.deviceId;
      let label = dev.label || `摄像头 ${idx + 1}`;
      if (dev.label && (dev.label.includes('GK122') || dev.label.includes('高拍仪') || 
          dev.label.includes('Document') || dev.label.includes('Scanner'))) {
        label = "⭐ " + label + " (高拍仪)";
        o.selected = true;
      }
      o.textContent = label;
      sel.appendChild(o);
    });
    setStatus(`检测到 ${videoDevices.length} 个设备`, "success");
  } catch(e) { setStatus("获取设备失败: " + e.message, "error"); }
}

async function startCamera() {
  const deviceId = document.getElementById("deviceSelect").value;
  const [w, h] = document.getElementById("resolutionSelect").value.split("x").map(Number);
  const constraints = {
    video: {
      deviceId: deviceId ? { exact: deviceId } : undefined,
      width: { ideal: w, max: w },
      height: { ideal: h, max: h },
      brightness: { ideal: parseInt(document.getElementById("brightness").value) },
      contrast: { ideal: parseInt(document.getElementById("contrast").value) },
      sharpness: { ideal: parseInt(document.getElementById("sharpness").value) },
    },
    audio: false
  };
  try {
    setStatus("正在连接摄像头...");
    currentStream = await navigator.mediaDevices.getUserMedia(constraints);
    const video = document.getElementById("video");
    video.srcObject = currentStream;
    video.style.display = "block";
    document.getElementById("placeholder").style.display = "none";
    video.onloadedmetadata = () => {
      const actualW = video.videoWidth;
      const actualH = video.videoHeight;
      document.getElementById("resTag").textContent = `分辨率: ${actualW}×${actualH}`;
      document.getElementById("statusTag").textContent = "状态: 已连接";
      setStatus(`摄像头已开启 (${actualW}×${actualH})`, "success");
    };
  } catch(e) { setStatus("开启失败: " + e.message, "error"); }
}

function stopCamera() {
  if (currentStream) {
    currentStream.getTracks().forEach(t => t.stop());
    currentStream = null;
  }
  document.getElementById("video").style.display = "none";
  document.getElementById("placeholder").style.display = "flex";
  document.getElementById("statusTag").textContent = "状态: 已停止";
  setStatus("摄像头已停止");
}

async function applyConstraints() {
  if (!currentStream) { setStatus("请先开启摄像头", "error"); return; }
  const track = currentStream.getVideoTracks()[0];
  try {
    await track.applyConstraints({
      brightness: parseInt(document.getElementById("brightness").value),
      contrast: parseInt(document.getElementById("contrast").value),
      sharpness: parseInt(document.getElementById("sharpness").value),
    });
    setStatus("设置已应用", "success");
  } catch(e) { setStatus("应用失败: " + e.message, "error"); }
}

function switchScanTab(tab, el) {
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  el.classList.add("active");
  ["manual","interval","auto","papers","record"].forEach(t => {
    const d = document.getElementById("tab-" + t);
    if (d) d.style.display = t === tab ? "block" : "none";
  });
  document.getElementById("scanModeBadge").textContent =
    {manual:"手动",interval:"定时",auto:"自动",papers:"证件",record:"录制"}[tab];
}

function captureFrame() {
  const video = document.getElementById("video");
  const canvas = document.getElementById("canvas");
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  const ctx = canvas.getContext("2d");
  ctx.drawImage(video, 0, 0);
  return canvas;
}

function addScanImage(dataUrl, w, h, name) {
  scanCount++;
  scanImages.push({ dataUrl, width: w, height: h, name, index: scanCount });
  document.getElementById("scanCountTag").textContent = `已扫描: ${scanCount}`;
  document.getElementById("scanTotalBadge").textContent = scanCount;
  refreshScanGrid();
}

function refreshScanGrid() {
  const grid = document.getElementById("scanGrid");
  if (scanImages.length === 0) {
    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:#ccc;font-size:12px;padding:20px">暂无扫描图片</div>';
    return;
  }
  grid.innerHTML = "";
  scanImages.forEach((img, i) => {
    const item = document.createElement("div");
    item.className = "scan-item";
    item.innerHTML = `<div class="idx">${i+1}</div><div class="del" onclick="deleteScan(${i})">✕</div><img src="${img.dataUrl}" loading="lazy">`;
    item.onclick = () => window.open(img.dataUrl, "_blank");
    grid.appendChild(item);
  });
}

function deleteScan(index) {
  scanImages.splice(index, 1);
  scanCount = scanImages.length;
  document.getElementById("scanCountTag").textContent = `已扫描: ${scanCount}`;
  document.getElementById("scanTotalBadge").textContent = scanCount;
  refreshScanGrid();
}

function scanOne() {
  if (!currentStream) { setStatus("请先开启摄像头", "error"); return; }
  const video = document.getElementById("video");
  const canvas = captureFrame();
  const format = document.getElementById("scanFormat").value;
  const quality = parseFloat(document.getElementById("scanQuality").value);
  const dataUrl = canvas.toDataURL(format, quality);
  const ext = format.split("/")[1];
  addScanImage(dataUrl, video.videoWidth, video.videoHeight, `GK122_${scanCount+1}.${ext}`);
  setStatus(`扫描成功 #${scanCount} (${video.videoWidth}×${video.videoHeight})`, "success");
}

async function scanFive() {
  for (let i = 0; i < 5; i++) {
    scanOne();
    await new Promise(r => setTimeout(r, 500));
  }
}

function startIntervalScan() {
  if (isScanning) return;
  const interval = parseInt(document.getElementById("intervalSec").value) * 1000;
  isScanning = true;
  setStatus(`定时扫描已开始 (间隔${interval/1000}秒)`, "success");
  scanTimer = setInterval(() => {
    if (!isScanning) return;
    scanOne();
  }, interval);
}

function startAutoScan() {
  if (isScanning) return;
  isScanning = true;
  setStatus("自动扫描已开始", "success");
  let lastScanTime = Date.now();
  scanTimer = setInterval(() => {
    if (!isScanning) return;
    const delay = parseInt(document.getElementById("autoDelay").value) * 1000;
    if (Date.now() - lastScanTime > delay) {
      scanOne();
      lastScanTime = Date.now();
    }
  }, 1000);
}

function stopScan() {
  isScanning = false;
  if (scanTimer) { clearInterval(scanTimer); scanTimer = null; }
  setStatus(`扫描已停止, 共${scanCount}张`, "success");
}

function scanPapers(side) {
  if (!currentStream) { setStatus("请先开启摄像头", "error"); return; }
  const canvas = captureFrame();
  const dataUrl = canvas.toDataURL("image/jpeg", 0.92);
  if (side === "front") {
    papersFrontData = dataUrl;
    document.getElementById("papersFront").innerHTML = `<img src="${dataUrl}" style="width:100%;height:100%;object-fit:cover">`;
  } else {
    papersBackData = dataUrl;
    document.getElementById("papersBack").innerHTML = `<img src="${dataUrl}" style="width:100%;height:100%;object-fit:cover">`;
  }
  setStatus(`${side === "front" ? "正面" : "反面"}扫描成功`, "success");
}

function clearPapers() {
  papersFrontData = "";
  papersBackData = "";
  document.getElementById("papersFront").innerHTML = '正面(人像) - 点击扫描';
  document.getElementById("papersBack").innerHTML = '反面(国徽) - 点击扫描';
}

function concatPapers() {
  if (!papersFrontData || !papersBackData) { setStatus("请先扫描正反面", "error"); return; }
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");
  const img1 = new Image(), img2 = new Image();
  let loaded = 0;
  const onLoad = () => {
    loaded++;
    if (loaded === 2) {
      const direction = document.getElementById("concatDir").value;
      let w, h;
      if (direction === "vertical") {
        w = Math.max(img1.width, img2.width);
        h = img1.height + img2.height;
      } else {
        w = img1.width + img2.width;
        h = Math.max(img1.height, img2.height);
      }
      canvas.width = w;
      canvas.height = h;
      if (direction === "vertical") {
        ctx.drawImage(img1, 0, 0);
        ctx.drawImage(img2, 0, img1.height);
      } else {
        ctx.drawImage(img1, 0, 0);
        ctx.drawImage(img2, img1.width, 0);
      }
      const dataUrl = canvas.toDataURL("image/jpeg", 0.92);
      addScanImage(dataUrl, w, h, `证件拼接_${Date.now()}.jpg`);
      setStatus("证件拼接成功", "success");
    }
  };
  img1.onload = onLoad; img2.onload = onLoad;
  img1.src = papersFrontData; img2.src = papersBackData;
}

async function startRecord() {
  if (!currentStream) { setStatus("请先开启摄像头", "error"); return; }
  const mimeTypes = ['video/webm;codecs=vp9', 'video/webm', 'video/mp4'];
  let selectedMimeType = '';
  for (const mt of mimeTypes) {
    if (MediaRecorder.isTypeSupported(mt)) {
      selectedMimeType = mt;
      break;
    }
  }
  if (!selectedMimeType) { setStatus("浏览器不支持录制", "error"); return; }
  recordedChunks = [];
  recorder = new MediaRecorder(currentStream, { mimeType: selectedMimeType });
  recorder.ondataavailable = e => {
    if (e.data.size > 0) recordedChunks.push(e.data);
  };
  recorder.onstop = () => {
    const blob = new Blob(recordedChunks, { type: selectedMimeType });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `GK122_record_${Date.now()}.webm`;
    a.click();
    setStatus("录制完成, 正在下载", "success");
  };
  recorder.start();
  document.getElementById("recordTag").textContent = "● 录制中";
  document.getElementById("recordTag").style.color = "#f56c6c";
  setStatus("录制已开始", "success");
}

function stopRecord() {
  if (!recorder) return;
  recorder.stop();
  recorder = null;
  document.getElementById("recordTag").textContent = "";
  setStatus("录制已停止", "success");
}

function rotateVideo() {
  const video = document.getElementById("video");
  video.style.transform = video.style.transform === "rotate(90deg)" ? "none" : "rotate(90deg)";
}

function fullscreenVideo() {
  const video = document.getElementById("video");
  if (video.requestFullscreen) video.requestFullscreen();
}

async function exportPdf() {
  if (scanImages.length === 0) { setStatus("无图片可导出", "error"); return; }
  setStatus("正在加载 PDF 库...");
  await loadJSPDF();
  setStatus("正在生成 PDF...");
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF({ orientation: 'portrait', unit: 'px', format: [400, 550] });
  scanImages.forEach((img, i) => {
    if (i > 0) pdf.addPage();
    pdf.addImage(img.dataUrl, 'JPEG', 0, 0, 400, 550);
  });
  pdf.save(`GK122_scan_${Date.now()}.pdf`);
  setStatus(`PDF导出成功 (${scanImages.length}页)`, "success");
}

function loadJSPDF() {
  return new Promise((resolve, reject) => {
    if (window.jspdf) { resolve(); return; }
    const script = document.createElement("script");
    script.src = "https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js";
    script.onload = resolve;
    script.onerror = reject;
    document.head.appendChild(script);
  });
}

function downloadAll() {
  scanImages.forEach(img => {
    const a = document.createElement("a");
    a.href = img.dataUrl;
    a.download = img.name;
    a.click();
  });
  setStatus(`已下载 ${scanImages.length} 张图片`, "success");
}

function clearAll() {
  scanImages = [];
  scanCount = 0;
  document.getElementById("scanCountTag").textContent = "已扫描: 0";
  document.getElementById("scanTotalBadge").textContent = "0";
  refreshScanGrid();
  setStatus("已清空", "success");
}

window.addEventListener("load", initDevices);
window.addEventListener("beforeunload", () => {
  if (currentStream) currentStream.getTracks().forEach(t => t.stop());
});
</script>
</body>
